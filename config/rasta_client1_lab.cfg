; Laboratory Cloud IXL RaSTA client configuration for Pedro's physical OC.
;
; This file configures the local RaSTA endpoints of the Cloud IXL side
; (RASTA_ID #00000062).
;
; The OC destination IPs used by sr_connect() can be provided at runtime:
;   CLOUD_IXL_OC_CH1_IP, CLOUD_IXL_OC_CH1_PORT
;   CLOUD_IXL_OC_CH2_IP, CLOUD_IXL_OC_CH2_PORT
;
; Assumed laboratory addressing:
;   Cloud IXL channel 1: 10.0.0.200:9998
;   Cloud IXL channel 2: 10.0.0.201:9999
;   Pedro OC channel 1:  10.0.0.100:8888
;   Pedro OC channel 2:  10.0.0.101:8889
;
; Adjust RASTA_REDUNDANCY_CONNECTIONS if the Cloud IXL machine receives
; different IP addresses in the laboratory.

;Configuration of the sending part

;std: 1800
RASTA_T_MAX = 10000

;std: 300
RASTA_T_H = 2000

; Length of the checksum in the SR layer
; Possible values:
;   NONE for no checksum
;   HALF for 8 byte checksum
;   FULL for 16 byte checksum
; Pedro's current OC lab configuration uses NONE.
RASTA_SR_CHECKSUM_LEN = NONE

; Algorithms that is used for calculating the checksum in the SR layer
; Possible values:
;     MD4
;     BLAKE2B
;     SIPHASH-2-4
RASTA_SR_CHECKSUM_ALGO = MD4

; The key for the hash function that is used for calculating the SR layer checksum
RASTA_SR_CHECKSUM_KEY = #12345678

;std: 0x67452301
RASTA_MD4_A = #67452301

;std: 0xefcdab89
RASTA_MD4_B = #efcdab89

;std: 0x98badcfe
RASTA_MD4_C = #98badcfe

;std: 0x10325476
RASTA_MD4_D = #10325476

;std: 20mqueu
RASTA_SEND_MAX = 10

;std: 10
RASTA_MWA = 10

;std: 3
RASTA_MAX_PACKET = 3

;std: 5000
RASTA_DIAG_WINDOW = 5000

;initial sequence number, if set to a negative value a random sequence number is used
RASTA_INITIAL_SEQ = -1


; configuration of the redundancy part

; Local Cloud IXL endpoints used by the RaSTA redundancy channels.
; These IPs must exist on the Cloud IXL host.
RASTA_REDUNDANCY_CONNECTIONS = {"192.168.0.151:9998"; "192.168.0.151:9999"}

;std: TYPE_A
;values: TYPE_A, TYPE_B, TYPE_C, TYPE_D, TYPE_E
RASTA_CRC_TYPE = TYPE_A

;std: 100
RASTA_T_SEQ = 50

;std: 200
RASTA_N_DIAGNOSE = 100

;std: 4
RASTA_N_DEFERQUEUE_SIZE = 2

;Configuration of the general part
;std: 0
RASTA_NETWORK = 1234

;std: 0
RASTA_ID = #00000062

;Logger configuration

; type of logging: 0 = CONSOLE, 1 = FILE, 2 = BOTH
LOGGER_TYPE = 0

; the path to a file where log messages are appended when the logger type is FILE or BOTH
LOGGER_FILE = "output.log"

; maximum log level: 3 = DEBUG, 2 = INFO, 1 = ERROR, 0 = NONE (logging disabled)
LOGGER_MAX_LEVEL = 1

; list of accepted RaSTA versions during handshake
RASTA_ACCEPTED_VERSIONS = {"0303"}
